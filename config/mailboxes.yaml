# =============================================================================
# M365 Email Population - Mailboxes Configuration
# =============================================================================
# This file defines the mailboxes to populate with realistic emails.
# 
# INSTRUCTIONS:
# 1. Add your users under the 'users' section with their UPN and job_title
# 2. The domain should match your tenant in environments.json
# 3. Adjust settings as needed for your scenario
# =============================================================================

# Global settings for email population
settings:
  # Default number of emails per mailbox (can be overridden per user)
  default_email_count: 50
  
  # Date range for backdating emails (in months)
  date_range_months: 12
  
  # Include Microsoft 365 sensitivity labels
  include_sensitivity_labels: true
  
  # Email type distribution (must sum to 100)
  # Categories:
  #   - newsletters: Internal company newsletters
  #   - links: Emails with SharePoint/web links
  #   - attachments: Emails with file attachments
  #   - organisational: Company-wide announcements
  #   - interdepartmental: Cross-department communications
  #   - security: Security alerts and notifications
  #   - spam: Junk/promotional emails (for realism)
  #   - external_business: Legitimate external business communications
  email_distribution:
    newsletters: 10
    links: 15
    attachments: 15
    organisational: 15
    interdepartmental: 15
    security: 8
    spam: 7
    external_business: 15
  
  # Threading settings
  threading:
    enabled: true
    single_email_percentage: 60
    reply_chain_percentage: 25
    forward_chain_percentage: 10
    reply_all_percentage: 5
    max_thread_depth: 5
  
  # Sender distribution (must sum to 100)
  # Types:
  #   - internal_users: Emails from colleagues within the organization
  #   - internal_system: System notifications (IT, HR systems, etc.)
  #   - external: Generic external senders (newsletters, vendors)
  #   - external_spam: Spam/junk emails
  #   - external_business: Legitimate external business communications
  sender_distribution:
    internal_users: 50
    internal_system: 15
    external: 10
    external_spam: 10
    external_business: 15
  
  # Date distribution settings
  date_settings:
    business_hours_percentage: 85
    weekday_percentage: 90
    recent_bias: true  # More emails in recent months
  
  # Rate limiting settings (to prevent API throttling)
  # Adjust these if you experience failures due to rate limiting
  rate_limiting:
    # Delay between individual API requests (milliseconds)
    # Higher values = slower but more reliable
    request_delay_ms: 100
    
    # Delay between batches of requests (milliseconds)
    # Helps prevent hitting rate limits on large batches
    batch_delay_ms: 500
    
    # Maximum retry attempts for failed requests
    # Uses exponential backoff (1s, 2s, 4s, 8s, 16s)
    max_retries: 5

# =============================================================================
# User Definitions
# =============================================================================
# Each user requires:
#   - upn: User Principal Name (email address)
#   - job_title: Job title
# Optional:
#   - department: Department name (auto-mapped if not specified)
#   - email_volume: high/medium/low or specific number
#   - receives_from: List of departments this user receives emails from
# =============================================================================

users:
  # Example users - REPLACE WITH YOUR ACTUAL USERS
  # The domain should match your M365 tenant
  
  - upn: user@yourtenant.onmicrosoft.com
    job_title: CEO
    department: Executive Leadership
    email_volume: high
    receives_from:
      - Executive Leadership
      - Finance Department
      - Human Resources
      - IT Department
      - All Departments
    
  - upn: user1@yourtenant.onmicrosoft.com
    job_title: Head of IT
    department: IT Department
    email_volume: high
    receives_from:
      - IT Department
      - Executive Leadership
      - All Departments
      - External Vendors

  # Add more users following the same pattern:
  # - upn: user@yourtenant.onmicrosoft.com
  #   job_title: Job Title
  #   department: Department Name
  #   email_volume: high  # high, medium, low, or specific number

