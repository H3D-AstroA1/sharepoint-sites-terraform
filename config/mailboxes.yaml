# =============================================================================
# Sensitivity Labels
# =============================================================================
# Microsoft 365 sensitivity label configuration
# =============================================================================

sensitivity_labels:
  general:
    name: "General"
    percentage: 50
    applies_to:
      - newsletters
      - links
      
  internal:
    name: "Internal"
    percentage: 30
    applies_to:
      - organisational
      - interdepartmental
      
  confidential:
    name: "Confidential"
    percentage: 15
    applies_to:
      - attachments
    departments:
      - Human Resources
      - Finance Department
      - Legal & Compliance
      
  highly_confidential:
    name: "Highly Confidential"
    percentage: 5
    applies_to:
      - attachments
    departments:
      - Executive Leadership

# =============================================================================
# Email Volume Mappings
# =============================================================================

volume_mappings:
  high: 100
  medium: 50
  low: 25
